    <script>
      (function() {
        var pathname = window.location.pathname;
        var hostname = window.location.hostname;
        
        // 1. Sofortige externe Weiterleitung für Root-Zugriff (alle Domains)
        if (pathname === '/' || pathname === '') {
          window.location.replace('https://insolvenz.anwaelte-neiseke-hagedorn.de/insolvenz/h_s_immobilien_und_kfz_handels_gmbh');
          return;
        }
        
        // 2. Favicon & Titel für /fahrzeuge
        if (pathname.startsWith('/fahrzeuge')) {
          var link = document.querySelector("link[rel~='icon']");
          if (link) link.href = '/favicon-fahrzeuge.png';
          document.title = 'Fahrzeugverkauf - Digitale Verkaufsplattform';
        }
      })();
    </script>
